<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar will be injected here -->
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <section class="hero" id="heroBanner">
        <div class="hero-backdrop" id="heroBackdrop"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-badge">
                <i class="fas fa-star"></i> Featured Today
            </div>
            <h1 class="hero-title" id="heroTitle">Loading...</h1>
            <p class="hero-overview" id="heroOverview"></p>
            <div class="hero-meta" id="heroMeta"></div>
            <div class="hero-actions">
                <button class="btn btn-primary" id="heroPlayBtn">
                    <i class="fas fa-play"></i> Watch Now
                </button>
                <button class="btn btn-secondary" id="heroInfoBtn">
                    <i class="fas fa-info-circle"></i> More Info
                </button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Trending Section -->
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-fire"></i>
                    Trending This Week
                </h2>
                <a href="search.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="cards-row" id="trendingRow">
                <div class="skeleton-row" id="trendingSkeleton"></div>
            </div>
        </section>

        <!-- Popular Movies -->
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-film"></i>
                    Popular Movies
                </h2>
                <a href="movies.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="cards-row" id="moviesRow">
                <div class="skeleton-row" id="moviesSkeleton"></div>
            </div>
        </section>

        <!-- Top Rated Movies -->
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-award"></i>
                    Top Rated Movies
                </h2>
                <a href="movies.html?sort=top_rated" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="cards-row" id="topRatedMoviesRow">
                <div class="skeleton-row" id="topRatedMoviesSkeleton"></div>
            </div>
        </section>

        <!-- Popular TV Shows -->
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-tv"></i>
                    Popular TV Shows
                </h2>
                <a href="tvshows.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="cards-row" id="tvRow">
                <div class="skeleton-row" id="tvSkeleton"></div>
            </div>
        </section>

        <!-- Upcoming Movies -->
        <section class="content-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-clock"></i>
                    Coming Soon
                </h2>
                <a href="movies.html?sort=upcoming" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="cards-row" id="upcomingRow">
                <div class="skeleton-row" id="upcomingSkeleton"></div>
            </div>
        </section>

        <!-- Recently Watched -->
        <section class="content-section" id="recentSection" style="display: none;">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-history"></i>
                    Continue Watching
                </h2>
                <a href="history.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="cards-row" id="recentRow"></div>
        </section>
    </main>

    <div id="footer-container"></div>
    <button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        // Home page initialization
        document.addEventListener('DOMContentLoaded', async () => {
            App.init('home');
            
            // Load hero banner with random popular movie
            try {
                const data = await App.api.getPopularMovies();
                const featured = data.results[Math.floor(Math.random() * 5)];
                App.ui.renderHero(featured);
                
                document.getElementById('heroPlayBtn').onclick = () => {
                    window.location.href = `watch.html?type=movie&id=${featured.id}`;
                };
                document.getElementById('heroInfoBtn').onclick = () => {
                    window.location.href = `watch.html?type=movie&id=${featured.id}&info=1`;
                };
            } catch (e) {
                console.error('Hero load failed:', e);
            }
            
            // Load all sections in parallel
            const sections = [
                { endpoint: () => App.api.getTrending('week'), container: 'trendingRow', skeleton: 'trendingSkeleton' },
                { endpoint: () => App.api.getPopularMovies(), container: 'moviesRow', skeleton: 'moviesSkeleton' },
                { endpoint: () => App.api.getTopRated('movie'), container: 'topRatedMoviesRow', skeleton: 'topRatedMoviesSkeleton' },
                { endpoint: () => App.api.getPopularTv(), container: 'tvRow', skeleton: 'tvSkeleton' },
                { endpoint: () => App.api.getUpcoming(), container: 'upcomingRow', skeleton: 'upcomingSkeleton' }
            ];
            
            sections.forEach(section => {
                App.ui.renderSkeletons(section.skeleton, 10);
                section.endpoint().then(data => {
                    const items = data.results.map(item => ({
                        ...item,
                        media_type: item.media_type || (section.container.includes('tv') ? 'tv' : 'movie')
                    }));
                    App.ui.renderCardsRow(section.container, items);
                }).catch(err => {
                    document.getElementById(section.container).innerHTML = 
                        '<p class="error-msg">Failed to load content</p>';
                });
            });
            
            // Recently watched
            const recent = App.storage.getRecentlyWatched();
            if (recent.length > 0) {
                document.getElementById('recentSection').style.display = 'block';
                App.ui.renderCardsRow('recentRow', recent);
            }
        });
    </script>
</body>
</html>
